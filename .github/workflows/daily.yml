name: 🎰 AIホール分析 毎日自動実行

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      hall_name:
        description: "分析ホール名"
        default: "有楽町UNO"
        type: string
      days_back:
        description: "集計期間（日数）"
        default: "30"
        type: string
      use_x_api:
        description: "X APIを使う"
        default: "false"
        type: choice
        options: ["false", "true"]

env:
  HALL_NAME:            ${{ github.event.inputs.hall_name    || '有楽町UNO' }}
  SPREADSHEET_ID:       ${{ secrets.SPREADSHEET_ID }}
  SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  X_BEARER_TOKEN:       ${{ secrets.X_BEARER_TOKEN }}
  USE_X_API:            ${{ github.event.inputs.use_x_api   || 'false' }}
  DAYS_BACK:            ${{ github.event.inputs.days_back   || '30' }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: パッケージインストール
        run: pip install -r requirements.txt
      - name: ディレクトリ準備
        run: mkdir -p logs data/yuurakucho_uno/x_posts dashboard/public
      - name: 分析実行
        run: python main.py
      - name: GitHub Pagesへデプロイ
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard/public
      - name: ログ保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
      - name: エラー時Issue作成
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 分析エラー ${new Date().toLocaleDateString('ja-JP')}`,
              body: [
                '## エラーが発生しました',
                `実行: #${context.runNumber}`,
                `[詳細](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '### よくある原因',
                '- data/yuurakucho_uno/ にCSVがない',
                '- Secrets未設定（SPREADSHEET_ID / SERVICE_ACCOUNT_JSON）',
                '- スプレッドシートの共有設定が未完了',
              ].join("\n"),
              labels: ["bug","automated"],
            })
